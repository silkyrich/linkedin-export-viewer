<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LinkedOut! — browse what LinkedIn stores about you, privately, in your browser. Nothing is uploaded.">

  <!-- Open Graph (LinkedIn, Facebook, Discord, Slack, iMessage, etc.) -->
  <meta property="og:site_name" content="LinkedOut!">
  <meta property="og:title" content="LinkedOut! — What LinkedIn stores about you, viewed on your terms.">
  <meta property="og:description" content="Drop your LinkedIn data-export zip. Everything stays in this browser tab — no server, no upload, no tracking. Open source, MIT-licensed.">
  <meta property="og:url" content="https://silkyrich.github.io/linkedin-export-viewer/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://silkyrich.github.io/linkedin-export-viewer/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="LinkedOut! logo">

  <!-- Twitter Card (also used by some other scrapers) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LinkedOut! — What LinkedIn stores about you, viewed on your terms.">
  <meta name="twitter:description" content="Drop your LinkedIn data-export zip. Everything stays in this browser tab — no server, no upload, no tracking.">
  <meta name="twitter:image" content="https://silkyrich.github.io/linkedin-export-viewer/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LinkedOut!">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LinkedOut!</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
