name: linkedin_export_viewer
description: "Browse your LinkedIn data export in the browser, privately."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Archive + parsing
  archive: ^3.6.1              # zip decode
  csv: ^6.0.0                  # multi-line-safe CSV parser

  # File picking on web
  file_picker: ^8.1.4          # returns Uint8List without dart:io

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2

  # UI
  two_dimensional_scrollables: ^0.3.3   # TableView.builder for 22k rows
  intl: ^0.19.0

  # Caching
  idb_shim: ^2.6.1             # cross-browser IndexedDB

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.8                # for tool/ script tests

flutter:
  uses-material-design: true
  # assets enabled in Phase 0c once tool/generate_fixture.dart produces the zip
  # assets:
  #   - fixtures/sample_export.zip
