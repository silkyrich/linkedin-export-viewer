name: linkedin_export_viewer
description: "LinkedOut! — browse your LinkedIn data export privately in your browser."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Archive + parsing
  archive: ^4.0.9              # zip decode
  csv: ^6.0.0                  # multi-line-safe CSV parser

  # File picking on web
  file_picker: ^11.0.2          # returns Uint8List without dart:io

  # State + routing
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.1

  # UI
  two_dimensional_scrollables: ^0.4.2   # TableView.builder for 22k rows
  intl: ^0.20.0

  # Caching
  idb_shim: ^2.6.1             # cross-browser IndexedDB

  # Web interop (for Articles iframe sandboxing)
  web: ^1.1.0

  # HTTP (for LLM provider calls in Advisor)
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.8                # for tool/ script tests

flutter:
  uses-material-design: true
  assets:
    - fixtures/sample_export.zip
